<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      @keyframes fillBar1 { from { width: 0; } to { width: 570px; } }
      @keyframes fillBar2 { from { width: 0; } to { width: 540px; } }
      @keyframes fillBar3 { from { width: 0; } to { width: 570px; } }
      @keyframes fillBar4 { from { width: 0; } to { width: 510px; } }
      @keyframes fillBar5 { from { width: 0; } to { width: 480px; } }
      @keyframes fillBar6 { from { width: 0; } to { width: 450px; } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .title { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 18px; font-weight: 600; fill: #59bbe5; }
      .skill-name { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 14px; fill: #c9d1d9; }
      .skill-pct { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 13px; fill: #8b949e; font-weight: 600; }
      .bar-bg { fill: #161b22; rx: 6; }
      .bar-fill { rx: 6; }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#59bbe5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6D00CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00DC82;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FC08D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7DF1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA4B71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e91e63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" class="title">⚡ Skill Proficiency</text>

  <!-- Skill 1: AI Prompt Engineering -->
  <g style="animation: fadeIn 0.5s ease 0.1s both;">
    <text x="30" y="95" class="skill-name">🤖 AI Prompt Engineering</text>
    <text x="770" y="95" text-anchor="end" class="skill-pct">95%</text>
    <rect x="30" y="105" width="600" height="14" class="bar-bg"/>
    <rect x="30" y="105" height="14" fill="url(#grad1)" style="animation: fillBar1 1.5s ease 0.3s both;" class="bar-fill"/>
  </g>

  <!-- Skill 2: Workflow Automation -->
  <g style="animation: fadeIn 0.5s ease 0.2s both;">
    <text x="30" y="160" class="skill-name">⚡ Workflow Automation (Make / n8n / Zapier)</text>
    <text x="770" y="160" text-anchor="end" class="skill-pct">90%</text>
    <rect x="30" y="170" width="600" height="14" class="bar-bg"/>
    <rect x="30" y="170" height="14" fill="url(#grad2)" style="animation: fillBar2 1.5s ease 0.5s both;" class="bar-fill"/>
  </g>

  <!-- Skill 3: Recruitment Strategy -->
  <g style="animation: fadeIn 0.5s ease 0.3s both;">
    <text x="30" y="225" class="skill-name">🎯 Recruitment Strategy &amp; Headhunting</text>
    <text x="770" y="225" text-anchor="end" class="skill-pct">95%</text>
    <rect x="30" y="235" width="600" height="14" class="bar-bg"/>
    <rect x="30" y="235" height="14" fill="url(#grad3)" style="animation: fillBar3 1.5s ease 0.7s both;" class="bar-fill"/>
  </g>

  <!-- Skill 4: No-Code / Low-Code -->
  <g style="animation: fadeIn 0.5s ease 0.4s both;">
    <text x="30" y="290" class="skill-name">🧩 No-Code / Low-Code Development</text>
    <text x="770" y="290" text-anchor="end" class="skill-pct">85%</text>
    <rect x="30" y="300" width="600" height="14" class="bar-bg"/>
    <rect x="30" y="300" height="14" fill="url(#grad4)" style="animation: fillBar4 1.5s ease 0.9s both;" class="bar-fill"/>
  </g>

  <!-- Skill 5: AI-Assisted Coding -->
  <g style="animation: fadeIn 0.5s ease 0.5s both;">
    <text x="30" y="355" class="skill-name">💻 AI-Assisted Coding (Cursor / Claude Code)</text>
    <text x="770" y="355" text-anchor="end" class="skill-pct">80%</text>
    <rect x="30" y="365" width="600" height="14" class="bar-bg"/>
    <rect x="30" y="365" height="14" fill="url(#grad5)" style="animation: fillBar5 1.5s ease 1.1s both;" class="bar-fill"/>
  </g>

  <!-- Skill 6: Data Analysis & Reporting -->
  <g style="animation: fadeIn 0.5s ease 0.6s both;">
    <text x="30" y="420" class="skill-name">📊 Data Analysis &amp; Reporting</text>
    <text x="770" y="420" text-anchor="end" class="skill-pct">75%</text>
    <rect x="30" y="430" width="600" height="14" class="bar-bg"/>
    <rect x="30" y="430" height="14" fill="url(#grad6)" style="animation: fillBar6 1.5s ease 1.3s both;" class="bar-fill"/>
  </g>

</svg>
